name: More Disk Space
description: Fast disk cleanup for GitHub's Ubuntu runners (ubuntu-24.04). Frees 10–27 GiB in 1–25 seconds.

branding:
  icon: trash-2
  color: blue

inputs:
  level:
    description: |
      Cleanup level (1-4):
      - 1: ~16 GiB in ~3 s
      - 2: ~23 GiB in ~4 s [default]
      - 3: ~27 GiB in ~10 s
      - 4: ~28 GiB in ~12 s
    required: false
    default: '2'

runs:
  using: node24
  main: 'index.js'
  post: 'post.js'
  post-if: 'always()'
